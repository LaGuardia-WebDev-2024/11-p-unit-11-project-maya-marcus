<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <button id="mem1-button">Memory #1</button>
    <button id="mem2-button">Memory #2</button>
    <button id="mem3-button">Memory #3</button>
    <h1>My Top 3 Memories of <span>This Year</span></h1>
    <ol>
      <li>
        <h3 id="mem1">Memory #1</h3>
        <p id="memp1">More about this memory.</p>
        <img
        class="beach"
        src="https://admin.onlyinyourstate.com/wp-content/uploads/sites/2/2025/03/Jupiter-Beach.jpg";
        width="350">
      </li>

      <li>
        <h3 id="mem2">Memory #2</h3>
        <p id="memp2">More about this memory.</p>
        <img
        class="oneact"
        src="https://www.shutterstock.com/image-vector/one-act-vintage-drama-faces-260nw-2487404145.jpg">
      </li>

      <li>
        <h3 id="mem3">Memory #3</h3>
        <p id="memp3">More about this memory</p>
        <img
        class="urine"
        src="https://m.media-amazon.com/images/I/71tzsSPAcmL._UF1000,1000_QL80_.jpg";
        width="300">
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
$(".beach").hide()
$(".oneact").hide()
$(".urine").hide()
      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "purple");
        $(".beach").show(1000) 
        $("#memp1").text ("Going to the beach over spring break and celebrating my birthday was one of the highlights of my year so far!")
        $("html").css("background-color","blue")
      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", " blue");
        $(".oneact").show(1000)
        $("#memp2").text ("Performing in One Acts in Noveember, acting with my friends, and doing really fun characters was also a highlight!")
      $("html").css("background-color", "pink")
      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "green");
        $(".urine").show(1000)
       $("#memp3").text ("Urinetown was my favorite performance and show this year, it was so much fun dancing and singing and I miss it so much!")
     $("html").css("background-color", "yellow")
      });


    </script>
  </body>
</html>
